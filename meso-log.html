async function deployNow(){
  const token = document.getElementById('token').value.trim();
  const btn = document.getElementById('btn');
  if(!token.startsWith('ghp_') && !token.startsWith('github_pat_')){
    show('err','❌ Token inválido. Deve começar com ghp_');
    return;
  }
  btn.disabled = true; btn.textContent = '⏳ Enviando...';
  show('info','🔍 Buscando SHA atual...');
  const h = {Authorization:'token '+token, Accept:'application/vnd.github.v3+json'};
  try{
    let sha = null;
    const info = await fetch('https://api.github.com/repos/marcowanuthe/meso-log/contents/meso-log.html',{headers:h});
    if(info.ok){ const d = await info.json(); sha = d.sha; show('info','📦 Enviando 501 KB para o GitHub...'); }
    else if(info.status===401){ throw new Error('Token inválido ou expirado'); }

    const body = {message:'fix: deploy meso-log.html correto - versão unificada Alvorada',content:FILE_B64,branch:'main'};
    if(sha) body.sha = sha;

    const put = await fetch('https://api.github.com/repos/marcowanuthe/meso-log/contents/meso-log.html',{
      method:'PUT', headers:{...h,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(put.ok){
      const r = await put.json();
      show('ok','✅ Deploy concluído!<br>Commit: <b>'+r.commit.sha.substring(0,10)+'</b><br><br>Aguarde ~1 min e acesse:<br><a class="link" href="https://marcowanuthe.github.io/meso-log/meso-log.html" target="_blank">marcowanuthe.github.io/meso-log/meso-log.html</a>');
      btn.textContent = '✅ Deploy feito!';
    } else {
      const e = await put.json();
      throw new Error(e.message || put.status);
    }
  }catch(e){
    show('err','❌ '+e.message);
    btn.disabled=false; btn.textContent='📤 Fazer Deploy Agora';
  }
}
function show(t,m){const e=document.getElementById('status');e.className=t;e.innerHTML=m;e.style.display='block';}
</script>
